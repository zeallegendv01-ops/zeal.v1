<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - 365extra</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: linear-gradient(135deg, #0d0d0b 0%, #1a1a18 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0d0d0b;
    }

    .reset-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      max-width: 500px;
      width: 90%;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reset-header {
      background: linear-gradient(135deg, #0d0d0b 0%, #1a1a18 100%);
      padding: 40px 30px;
      text-align: center;
    }

    .reset-icon {
      font-size: 60px;
      color: #ffd700;
      margin-bottom: 20px;
    }

    .reset-title {
      color: #ccc;
      font-size: 24px;
      margin: 0;
    }

    .reset-body {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #0d0d0b;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
    }

    .password-strength {
      font-size: 12px;
      margin-top: 5px;
      display: flex;
      gap: 5px;
    }

    .strength-bar {
      height: 3px;
      flex: 1;
      background: #ddd;
      border-radius: 2px;
    }

    .strength-bar.weak { background: #e74c3c; }
    .strength-bar.medium { background: #f39c12; }
    .strength-bar.strong { background: #27ae60; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }

    .btn-primary {
      background-color: #ffd700;
      color: #0d0d0b;
    }

    .btn-primary:hover:not(:disabled) {
      background-color: #ffed4e;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .alert {
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.show { display: block; }
    .alert.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    .reset-footer {
      background: #f9f9f9;
      padding: 20px;
      text-align: center;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #999;
    }

    .form-disabled {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-header">
      <div class="reset-icon">
        <i class="fa-solid fa-key"></i>
      </div>
      <h1 class="reset-title">Reset Password</h1>
    </div>

    <div class="reset-body">
      <div class="alert" id="alert"></div>

      <form id="resetForm" onsubmit="handleResetPassword(event)">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" required>
          <div class="password-strength" id="strengthIndicator">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          Reset Password
        </button>
      </form>
    </div>

    <div class="reset-footer">
      © 2026 365extra Heritage. All Rights Reserved.
    </div>
  </div>

  <script>
    // Check password strength
    document.getElementById('password').addEventListener('input', function() {
      const password = this.value;
      const bars = document.querySelectorAll('.strength-bar');
      
      let strength = 0;
      if (password.length >= 8) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;

      bars.forEach(bar => bar.classList.remove('weak', 'medium', 'strong'));
      
      if (strength === 0) return;
      if (strength === 1) bars.forEach(bar => bar.classList.add('weak'));
      if (strength === 2) bars.forEach((bar, i) => { if (i < 2) bar.classList.add('medium'); });
      if (strength === 3) bars.forEach(bar => bar.classList.add('strong'));
    });

    async function handleResetPassword(e) {
      e.preventDefault();

      const token = new URLSearchParams(window.location.search).get('token');
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const alert = document.getElementById('alert');
      const submitBtn = document.getElementById('submitBtn');
      const form = document.getElementById('resetForm');

      if (password.length < 8) {
        showAlert('Password must be at least 8 characters long', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showAlert('Passwords do not match', 'error');
        return;
      }

      if (!token) {
        showAlert('Invalid reset link', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Resetting...';

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password, confirmPassword })
        });

        const data = await response.json();

        if (data.success) {
          showAlert('Password reset successfully! Redirecting to login...', 'success');
          form.classList.add('form-disabled');
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          showAlert(data.message || 'Failed to reset password', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Reset Password';
        }
      } catch (error) {
        showAlert('An error occurred. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Reset Password';
      }
    }

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert show ${type}`;
    }

    // Check if token is present
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      showAlert('Invalid reset link', 'error');
      document.getElementById('resetForm').classList.add('form-disabled');
    }
  </script>
</body>
</html>
