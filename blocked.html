<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied - 365extra</title>
  <style>
    :root {
      --danger: #ef4444;
      --danger-dark: #b91c1c;
      --bg: var(--text-main);
      --card-bg: var(--text-main);
      --text-main: #ffffff;
      --text-muted: #a3a3a3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text-main);
    }

    .blocked-container {
      background: var(--card-bg);
      /* border: 1px solid #333; */
      border-radius: 8px;
      max-width: 350px;
      width: 70%;
      padding: 60px 40px;
      text-align: center;
      /* box-shadow: 0 0 30px rgba(239, 68, 68, 0.1); */
    }

    .blocked-icon {
      font-size: 60px;
      margin-bottom: 20px;
      color: var(--danger);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .blocked-title {
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      color: var(--danger);
    }

    .blocked-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .blocked-reason {
      background: #1a0505;
      border: 1px solid var(--danger);
      padding: 16px;
      border-radius: 4px;
      margin-bottom: 30px;
      text-align: left;
    }

    .blocked-reason-label {
      font-size: 10px;
      color: var(--danger);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .blocked-reason-text { font-size: 14px; color: #fff; font-family: 'Courier New', monospace; }

    .blocked-score {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .score-value { font-size: 32px; font-weight: 800; color: white; }
    .score-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

    .blocked-actions { display: flex; gap: 12px; flex-direction: column; }

    .btn {
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary { background: var(--danger); color: white; border: none; }
    .btn-primary:hover { background: var(--danger-dark); }

    .btn-secondary { background: transparent; color: var(--danger); border: 1px solid #444; }
    .btn-secondary:hover { border-color: var(--danger); }

    .blocked-footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #333;
      font-size: 11px;
      color: #666;
    }

    .blocked-logo {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 30px;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="blocked-container">
    <!-- <div class="blocked-logo"></div> -->
    <div class="blocked-icon">⚠️</div>
    
    <h1 class="blocked-title">Access Denied</h1>
    <p class="blocked-subtitle">
      365EA: Security protocols have been triggered by suspicious account activity. Your access is currently restricted.
    </p>

    <div class="blocked-reason" id="reasonBox" style="display: none;">
      <div class="blocked-reason-label">Threat Detected</div>
      <div class="blocked-reason-text" id="reasonText"></div>
    </div>

    <div class="blocked-score" id="scoreBox" style="display: none;">
      <div class="score-item">
        <div class="score-value" id="scoreValue">--</div>
        <div class="score-label">Risk Level</div>
      </div>
    </div>

    <div class="blocked-actions">
      <button class="btn btn-primary" onclick="goHome()">Return to Safety</button>
      <button class="btn btn-secondary" onclick="contactSupport()">Report False Positive</button>
    </div>

    <div class="blocked-footer">
      <p>This is a mandatory security measure. Ref: <code id="sessionId"></code></p>
    </div>
  </div>

  <script>
    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    function goHome() {
      window.location.href = '/';
    }

    function contactSupport() {
      window.location.href = 'mailto:support@365extra.com?subject=Security%20Incident&body=I%20was%20blocked%20from%20accessing%20365extra';
    }

    const reason = getQueryParam('reason');
    const score = getQueryParam('score');
    
    if (reason) {
      document.getElementById('reasonBox').style.display = 'block';
      document.getElementById('reasonText').textContent = decodeURIComponent(reason);
    }

    if (score) {
      document.getElementById('scoreBox').style.display = 'block';
      document.getElementById('scoreValue').textContent = score;
    }

    document.getElementById('sessionId').textContent = 'SEG-' + Math.random().toString(36).substring(2, 11).toUpperCase();
  </script>
</body>
</html>
